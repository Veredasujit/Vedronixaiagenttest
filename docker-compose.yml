version: "3.9"

services:
  ai-agent:
    build: .
    container_name: pipecat-agent
    ports:
      - "8007:7860"
    env_file:
      - .env
    restart: unless-stopped
    command: python smartflo_agent.py --transport twilio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3